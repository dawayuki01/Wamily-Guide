name: Newsletter Sequence

# 毎日 07:30 JST (22:30 UTC前日) に自動実行 + 手動実行
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  sequence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send sequence emails
        run: node scripts/newsletter-sequence.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NEWSLETTER_SUBSCRIBERS_DB_ID: ${{ secrets.NEWSLETTER_SUBSCRIBERS_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_GAS_URL: ${{ secrets.NEWSLETTER_GAS_URL }}
          SLACK_WEBHOOK_NEWSLETTER: ${{ secrets.SLACK_WEBHOOK_NEWSLETTER }}
