name: Wamily Letter お知らせ配信

# 毎日 08:00 JST (23:00 UTC前日) に自動チェック + 手動実行
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-announcements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send announcements
        run: node scripts/newsletter-announce.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NEWSLETTER_SUBSCRIBERS_DB_ID: ${{ secrets.NEWSLETTER_SUBSCRIBERS_DB_ID }}
          NEWSLETTER_GAS_URL: ${{ secrets.NEWSLETTER_GAS_URL }}
          NEWSLETTER_TEST_EMAIL: ${{ secrets.NEWSLETTER_TEST_EMAIL }}
