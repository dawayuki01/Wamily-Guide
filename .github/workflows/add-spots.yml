name: Add Spots Bulk

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（Notion投入なし）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  add-spots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install @notionhq/client

      - name: Run add-spots-bulk
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SPOTS_DB_ID: ${{ secrets.NOTION_SPOTS_DB_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/add-spots-bulk.js --dry-run
          else
            node scripts/add-spots-bulk.js
          fi
