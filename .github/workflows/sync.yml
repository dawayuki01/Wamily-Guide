name: データ自動同期

# 毎日 JST 09:00 (UTC 00:00) に実行 + 手動実行も可能
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/*.json を commit するため

    steps:
      # ────────────────────────────────
      # セットアップ
      # ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      # ────────────────────────────────
      # 1. Claude API → Notionにコンテンツ自動生成（週1: 月曜のみ）
      #    - 最近の動き：各国の季節トピックを投稿
      #    - キュレーション：YouTube/Instagram/ブログ提案を追加
      # ────────────────────────────────
      - name: Generate content (Claude → Notion)
        id: generate_content
        if: github.event_name == 'workflow_dispatch' || toJSON(github.event.schedule) == '"0 0 * * 1"'
        run: node scripts/generate-guide.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_LIVEFEED_DB_ID: ${{ secrets.NOTION_LIVEFEED_DB_ID }}
          NOTION_CURATION_DB_ID: ${{ secrets.NOTION_CURATION_DB_ID }}
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
        continue-on-error: true

      # ────────────────────────────────
      # 2. Notion → data/*.json に同期
      #    - 最近の動き / スポット / キュレーション
      # ────────────────────────────────
      - name: Fetch Notion (ライブフィード / スポット / キュレーション)
        id: fetch_notion
        run: node scripts/fetch-notion.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_LIVEFEED_DB_ID: ${{ secrets.NOTION_LIVEFEED_DB_ID }}
          NOTION_SPOTS_DB_ID: ${{ secrets.NOTION_SPOTS_DB_ID }}
          NOTION_CURATION_DB_ID: ${{ secrets.NOTION_CURATION_DB_ID }}
          NOTION_HOST_DB_ID: ${{ secrets.NOTION_HOST_DB_ID }}
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
        continue-on-error: true

      # ────────────────────────────────
      # 3. TimeOut London RSS + Claude フィルタ → イベント
      # ────────────────────────────────
      - name: Fetch & filter events (RSS + Claude API)
        id: fetch_events
        run: node scripts/fetch-events.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
        continue-on-error: true

      # ────────────────────────────────
      # 3.5. Google My Maps → 新規スポット取得
      #    - My Maps に追加されたピンを spots-*.json に反映
      # ────────────────────────────────
      - name: Fetch new spots from Google My Maps
        id: fetch_mymaps
        run: node scripts/fetch-mymaps.js
        env:
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
        continue-on-error: true

      # ────────────────────────────────
      # 4. Google Places → スポット営業状況（週1: 月曜のみ）
      # ────────────────────────────────
      - name: Check spot status (Google Places)
        id: check_spots
        if: github.event_name == 'workflow_dispatch' || toJSON(github.event.schedule) == '"0 0 * * 1"'
        run: node scripts/check-spots.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SPOTS_DB_ID: ${{ secrets.NOTION_SPOTS_DB_ID }}
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
        continue-on-error: true

      # ────────────────────────────────
      # 5. ヘルスチェック & Slackレポート
      # ────────────────────────────────
      - name: Health check & Slack report
        if: always()
        run: node scripts/health-check.js
        env:
          SLACK_WEBHOOK_PATROL: ${{ secrets.SLACK_WEBHOOK_PATROL }}
          SLACK_WEBHOOK_CONTENT: ${{ secrets.SLACK_WEBHOOK_CONTENT }}
          STEP_GENERATE: ${{ steps.generate_content.outcome }}
          STEP_NOTION: ${{ steps.fetch_notion.outcome }}
          STEP_EVENTS: ${{ steps.fetch_events.outcome }}
          STEP_MYMAPS: ${{ steps.fetch_mymaps.outcome }}
          STEP_SPOTS: ${{ steps.check_spots.outcome }}

      # ────────────────────────────────
      # 6. 変更があれば commit & push
      # ────────────────────────────────
      - name: Commit updated data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 データ自動更新 [skip ci]'
          file_pattern: 'data/*.json'
          commit_user_name: 'Wamily Bot'
          commit_user_email: 'bot@wamily.jp'
