name: Geocode Spots

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（ファイル更新なし）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  geocode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Geocode spots
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/geocode-spots.js --dry-run
          else
            node scripts/geocode-spots.js
          fi

      - name: Commit & push updated data
        if: ${{ inputs.dry_run != 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: スポット座標を自動取得'
          file_pattern: 'data/spots-*.json'
